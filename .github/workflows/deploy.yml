name: Deploy Flask App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/web-calculator || git clone https://github.com/tpsonu/web-calculator.git ~/web-calculator
            cd ~/web-calculator
            git pull origin main
            docker build -t calculator:v1 .
            docker stop calculator || true
            docker rm calculator || true
            docker run -d -p 5000:5000 --name calculator calculator:v1
          EOF
